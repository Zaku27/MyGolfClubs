name: my_golf_bag
description: クラブラボ- 自分のクラブを楽しく分析。スペック、距離、バランスを管理。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Charts
  fl_chart: ^1.2.0

  # Local database (SQLite — mirrors the existing TypeScript Dexie layer)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Icons
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lie_angle_standards.json
